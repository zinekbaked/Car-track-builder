<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Car Track Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>Car Track Builder</h1>
    <div id="viewHint" class="hint">Menu</div>
  </header>

  <section id="menuView" class="view">
    <div class="card">
      <h2>Hlavní menu</h2>

      <div class="row">
        <button id="btnNew">Nová mapa</button>
      </div>

      <div class="row">
        <label for="savedSelect">Uložené mapy:</label>
        <select id="savedSelect"></select>
      </div>

      <div class="row">
        <button id="btnLoad">Načíst</button>
        <button id="btnDelete" class="danger">Smazat</button>
      </div>

      <hr>

      <h3>Export / Import</h3>
      <div class="row">
        <button id="btnExport">Export vybrané</button>
        <button id="btnImport">Import</button>
      </div>

      <textarea id="ioArea" placeholder="JSON import"></textarea>
    </div>
  </section>

  <section id="editorView" class="view hidden">
    <div class="card">
      <div class="row space">
        <div>
          <h2>Editor</h2>
          <div class="small">Aktuální mapa: <b id="currentName">---</b></div>
        </div>
        <button id="btnBack">Zpět do menu</button>
      </div>

      <div class="toolbar">
        <span class="small">Vybraný štětec:</span>
        <b id="brushName">Tráva</b>

        <div class="row">
          <button class="brush" data-tile="0">Tráva</button>
          <button class="brush" data-tile="1">Cesta</button>
          <button class="brush" data-tile="2">Voda</button>
        </div>
      </div>

      <div id="grid" class="grid"></div>

      <div class="row space">
        <button id="btnSave">Uložit</button>
        <button id="btnClear" class="danger">Vymazat mapu</button>
      </div>
    </div>
  </section>


  <script src="script.js"></script>
</body>
</html>
